openapi: 3.0.3
info:
  title: AWS EKS 기반 MSA 운영 포트폴리오 - API 문서
  version: 1.0.0
  description: |
    본 프로젝트는 Spring Boot 마이크로서비스(member/product/ordering)를 AWS EKS(Kubernetes) 환경에서 운영하기 위한 인프라/배포/관측 체계를 구성한 운영 중심 포트폴리오입니다.

    운영 구성(포트폴리오 포인트):
    - Infrastructure: AWS(EKS, EC2, Route53, RDS Aurora MySQL)
    - Container: Docker, Kubernetes
    - GitOps/CD: ArgoCD
    - CI: GitHub Actions -> Docker build -> ECR push
    - Monitoring: Prometheus, Grafana
    - Autoscaling: HPA, Cluster Autoscaler
    - MSA: Spring MSA, API Gateway(Spring Cloud Gateway)
    - DNS/HTTPS: Route53, cert-manager, Ingress


servers:
  - url: https://server.awskdy.click
    description: 운영 도메인(예시). 실제 배포 시 Ingress/Route53로 연결된 URL

tags:
  - name: System
    description: 운영 점검(Health 등)
  - name: Auth
    description: 인증/토큰(JWT + Redis RefreshToken)
  - name: Product Service
    description: 상품 서비스(재고 관리)
  - name: Ordering Service
    description: 주문 서비스(이벤트 기반 연동)

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: HealthController.healthCheck
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: ok2

  /member/create:
    post:
      tags: [Auth]
      summary: 회원가입
      description: MemberController.memberCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberSaveReqDto"
            example:
              name: "donny"
              email: "donny@example.com"
              password: "P@ssw0rd!"
      responses:
        "201":
          description: Created (member id 반환)
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 1

  /member/doLogin:
    post:
      tags: [Auth]
      summary: 로그인
      description: |
        MemberController.doLogin
        - Body: LoginDto (JSON)
        - Response: id, token(AccessToken), refreshToken(RefreshToken)
        - RefreshToken은 Redis에 저장(코드 기준)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
            example:
              email: "donny@example.com"
              password: "P@ssw0rd!"
      responses:
        "200":
          description: OK (loginInfo)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                id: 1
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

  /member/refresh-token:
    post:
      tags: [Auth]
      summary: Access Token 재발급
      description: |
        MemberController.generateNewAt
        - Body: MemberRefreshDto (JSON)
        - RefreshToken을 디코딩하여 subject(email 추정)을 얻고 Redis 값과 비교(코드 기준)
        - 성공 시 새 AccessToken(token) 반환
        - 실패 시 400
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberRefreshDto"
            example:
              refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        "200":
          description: OK (new AT)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenOnlyResponse"
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Bad Request (RT 검증 실패)
          content:
            application/json:
              schema:
                nullable: true

  /product/create:
    post:
      tags: [Product Service]
      summary: 상품 생성
      description: |
        ProductController.productCreate
        - Header: X-User-Id (required)
        - Body: ProductRegisterDto
        주의: 코드에서 @RequestBody가 없어서 Spring MVC 기본 바인딩(폼 파라미터) 가능성이 큼.
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
          description: 사용자 식별자(필수)
          example: "1"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/ProductRegisterDto"
      responses:
        "201":
          description: Created (product id 반환)
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 200

  /product/{id}:
    get:
      tags: [Product Service]
      summary: 상품 상세 조회
      description: |
        ProductController.productDetail
        - Path: id
        - Header: X-User-Id (required)
        - Response: ProductResDto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 상품 ID
          example: 1
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
          description: 사용자 식별자(필수)
          example: "1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResDto"
              example:
                id: 1
                name: "Keyboard"
                price: 30000
                stockQuantity: 10

  /product/updatestock:
    put:
      tags: [Product Service]
      summary: 재고 수정
      description: |
        ProductController.updateStock
        - Body: ProductUpdateStockDto (JSON)
        - Response: product id (Long)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateStockDto"
            example:
              productId: 1
              productQuantity: 5
      responses:
        "200":
          description: OK (product id 반환)
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 200

  /ordering/create:
    post:
      tags: [Ordering Service]
      summary: 주문 생성
      description: |
        OrderingController.orderCreate
        - Header: X-User-Id (required)
        - Body: OrderCreateDto (JSON)
        - Response: ordering id (Long)
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
          description: 사용자 식별자(필수)
          example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreateDto"
            example:
              productId: 1
              productCount: 2
      responses:
        "201":
          description: Created (ordering id 반환)
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 100

components:
  schemas:
    # ---- member/auth ----
    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: 이메일
          example: "donny@example.com"
        password:
          type: string
          description: 비밀번호
          example: "P@ssw0rd!"

    MemberSaveReqDto:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          description: 이름
          example: "donny"
        email:
          type: string
          format: email
          description: 이메일
          example: "donny@example.com"
        password:
          type: string
          description: 비밀번호
          example: "P@ssw0rd!"

    MemberRefreshDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    LoginResponse:
      type: object
      required: [id, token, refreshToken]
      properties:
        id:
          type: integer
          format: int64
          description: 회원 ID
          example: 1
        token:
          type: string
          description: Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refreshToken:
          type: string
          description: Refresh Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    TokenOnlyResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: 새로 발급된 Access Token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    # ---- ordering ----
    OrderCreateDto:
      type: object
      required: [productId, productCount]
      properties:
        productId:
          type: integer
          format: int64
          description: 주문할 상품 ID
          example: 1
        productCount:
          type: integer
          format: int32
          description: 주문 수량
          example: 2

    # ---- product ----
    ProductRegisterDto:
      type: object
      required: [name, category, price, stockQuantity]
      properties:
        name:
          type: string
          description: 상품명
          example: "Keyboard"
        category:
          type: string
          description: 카테고리
          example: "IT"
        price:
          type: integer
          format: int32
          description: 가격
          example: 30000
        stockQuantity:
          type: integer
          format: int32
          description: 초기 재고 수량
          example: 10

    ProductUpdateStockDto:
      type: object
      required: [productId, productQuantity]
      properties:
        productId:
          type: integer
          format: int64
          description: 재고 변경 대상 상품 ID
          example: 1
        productQuantity:
          type: integer
          format: int32
          description: 변경할 재고 수량(증감/절대값 여부는 서비스 로직 기준)
          example: 5

    ProductResDto:
      type: object
      required: [id, name, price, stockQuantity]
      properties:
        id:
          type: integer
          format: int64
          description: 상품 ID
          example: 1
        name:
          type: string
          description: 상품명
          example: "Keyboard"
        price:
          type: integer
          format: int32
          description: 가격
          example: 30000
        stockQuantity:
          type: integer
          format: int32
          description: 재고 수량
          example: 10
